<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/collab-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CollabBoard</title>

    <link rel="preload" as="image" href="/collab-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ===== Preloader Container ===== */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0a0a0a;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      .logo-container {
        position: relative;
        width: 90px;
        height: 90px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .logo {
        width: 48px;
        height: 48px;
        color: #22c55e;
        z-index: 2;
        filter: brightness(0) invert(1)
          drop-shadow(0 0 4px rgba(34, 197, 94, 0.3));
        animation: pulse 2.2s ease-in-out infinite;
      }

      .ring {
        position: absolute;
        width: 80px;
        height: 80px;
        border: 2px solid rgba(64, 64, 64, 0.3);
        border-top: 2px solid #22c55e;
        border-radius: 50%;
        animation:
          spin 1s linear infinite,
          ring-glow 2.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          filter: brightness(0) invert(1)
            drop-shadow(0 0 4px rgba(34, 197, 94, 0.3));
        }
        50% {
          transform: scale(1.08);
          filter: brightness(0) invert(1)
            drop-shadow(0 0 8px rgba(34, 197, 94, 0.5));
        }
      }

      @keyframes ring-glow {
        0%,
        100% {
          box-shadow: 0 0 4px rgba(34, 197, 94, 0.1);
        }
        50% {
          box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body style="background-color: #0a0a0a">
    <div id="loader">
      <div class="logo-container">
        <div class="ring"></div>
        <img src="/collab-logo.svg" alt="CollabBoard Logo" class="logo" />
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
