<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/collab-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CollabBoard</title>
    <link rel="preload" as="image" href="/collab-logo.svg" />

    <style>
      /* ===== Preloader Container ===== */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0a0a0a;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      .logo-container {
        position: relative;
        width: 90px;
        height: 90px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .logo {
        width: 48px;
        height: 48px;
        color: #fbbf24;
        z-index: 2;
        filter: brightness(0) invert(1)
          drop-shadow(0 0 4px rgba(251, 191, 36, 0.4));
      }

      .ring {
        position: absolute;
        width: 80px;
        height: 80px;
        border: 4px solid rgba(255, 255, 255, 0.08);
        border-top: 4px solid #fbbf24;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body style="background-color: #0a0a0a">
    <div id="loader">
      <div class="logo-container">
        <div class="ring"></div>
        <img src="/collab-logo.svg" alt="CollabBoard Logo" class="logo" />
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
